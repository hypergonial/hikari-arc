name: publish

on:
  release:
    types: [ published ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11"
          python-version: "3.14"
      - name: publish
        run: |
          uv build --no-sources
          uv publish --token ${{ secrets.PYPI_TOKEN }}

  update-docs:
    needs: publish
    uses: ./.github/workflows/docs.yml
